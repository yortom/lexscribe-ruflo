services:
  mongodb:
    image: mongo:8
    container_name: lexscribe-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - ./data/mongo:/data/db
    environment:
      MONGO_INITDB_DATABASE: lexscribe

  minio:
    image: minio/minio:latest
    container_name: lexscribe-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'   # API S3
      - '9001:9001'   # Web console
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: lexscribe-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ../.env
    depends_on:
      - mongodb
      - minio

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    container_name: lexscribe-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ../.env
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: lexscribe-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
